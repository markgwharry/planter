# ── MQTT consumer: subscribes to all planters ────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.1.125:1883"]
  topics  = ["planter/+/moisture", "planter/+/alert"]

  # Extract plant_id from topic: planter/<plant_id>/moisture
  topic_tag = ""
  [[inputs.mqtt_consumer.topic_parsing]]
    topic  = "planter/+/+"
    tags   = "_/plant_id/message_type"

  data_format = "json"
  json_string_fields = ["status"]

  # Tag alerts so Grafana can filter/alert on them
  tagexclude = ["host", "topic"]

# ── Output to InfluxDB v2 ────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "planter-token-change-me"
  organization = "planter"
  bucket       = "moisture"
