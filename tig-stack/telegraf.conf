# ── MQTT consumer: subscribes to all planters ────────────────────
[[inputs.mqtt_consumer]]
  servers = ["tcp://192.168.1.125:1883"]
  topics  = ["planter/+/moisture", "planter/+/alert"]
  topic_tag = "topic"
  data_format = "json"
  tagexclude = ["host"]

# ── Extract plant_id from topic tag ──────────────────────────────
[[processors.regex]]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^planter/([^/]+)/(.+)$"
    replacement = "${1}"
    result_key = "plant_id"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^planter/[^/]+/(.+)$"
    replacement = "${1}"
    result_key = "message_type"

# ── Output to InfluxDB v2 ────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "planter-token-change-me"
  organization = "planter"
  bucket       = "moisture"
